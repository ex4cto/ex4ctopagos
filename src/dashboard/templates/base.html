<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block titulo %}Dashboard{% endblock %} — Ex4cto Pagos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
    .navbar-top { background: #0f172a; padding: .9rem 0; }
    .navbar-top .marca { color: #fff; font-weight: 700; font-size: 1.2rem; letter-spacing: .5px; }
    .navbar-top .negocio { color: #94a3b8; font-size: .9rem; }
    .card { border: none; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .card-metrica { transition: transform .15s; }
    .card-metrica:hover { transform: translateY(-2px); }
    .monto-card { font-size: 1.9rem; font-weight: 700; color: #16a34a; line-height: 1.1; }
    .label-card { font-size: .78rem; text-transform: uppercase; letter-spacing: .6px; color: #64748b; }
    .cantidad-card { font-size: .95rem; color: #475569; margin-top: .2rem; }
    .badge-bancolombia { background: #fbbf24; color: #1c1917; font-size: .72rem; }
    .badge-nequi { background: #db2777; color: #fff; font-size: .72rem; }
    .badge-ok { background: #dcfce7; color: #166534; font-size: .72rem; }
    .badge-fail { background: #fee2e2; color: #991b1b; font-size: .72rem; }
    table th { font-size: .78rem; text-transform: uppercase; letter-spacing: .5px; color: #64748b; border-bottom: 2px solid #e2e8f0; }
    table td { font-size: .88rem; vertical-align: middle; }
    .sin-pagos { color: #94a3b8; text-align: center; padding: 3rem 0; }
  </style>
</head>
<body>
  <nav class="navbar-top mb-4">
    <div class="container d-flex justify-content-between align-items-center">
      <span class="marca">Ex4cto Pagos</span>
      <span class="negocio">{% block nombre_negocio %}{% endblock %}</span>
    </div>
  </nav>
  <div class="container pb-5">
    {% block contenido %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
