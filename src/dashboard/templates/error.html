{% extends "base.html" %}

{% block titulo %}Error{% endblock %}

{% block contenido %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
  <div class="text-center">
    <div style="font-size: 3.5rem; color: #cbd5e1;">404</div>
    <h5 class="fw-bold text-dark mt-2">{{ mensaje }}</h5>
    <p class="text-muted" style="font-size:.88rem">
      Verifica que el enlace sea correcto o contacta a tu administrador.
    </p>
  </div>
</div>
{% endblock %}
